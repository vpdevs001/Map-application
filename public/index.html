<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location Sharing Application</title>
    <meta
      name="description"
      content="Real-time location sharing powered by Kafka and Socket.IO"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset & Base ─────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0f1117;
        --bg-secondary: #161822;
        --bg-card: rgba(22, 24, 34, 0.85);
        --accent: #6c63ff;
        --accent-glow: rgba(108, 99, 255, 0.35);
        --accent-secondary: #00d9ff;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0ac;
        --border: rgba(255, 255, 255, 0.06);
        --success: #34d399;
        --danger: #f87171;
        --radius: 14px;
        --font: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        font-family: var(--font);
        background: var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header / Navbar ──────────────────────── */
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 60px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        z-index: 1000;
        flex-shrink: 0;
      }

      .navbar__brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .navbar__logo {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          var(--accent),
          var(--accent-secondary)
        );
        display: grid;
        place-items: center;
        box-shadow: 0 0 18px var(--accent-glow);
        animation: logoPulse 3s ease-in-out infinite;
      }

      @keyframes logoPulse {
        0%,
        100% {
          box-shadow: 0 0 18px var(--accent-glow);
        }
        50% {
          box-shadow:
            0 0 28px var(--accent-glow),
            0 0 56px rgba(108, 99, 255, 0.12);
        }
      }

      .navbar__logo svg {
        width: 18px;
        height: 18px;
        fill: #fff;
      }

      .navbar__title {
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: -0.3px;
        background: linear-gradient(
          135deg,
          var(--text-primary),
          var(--accent-secondary)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .navbar__status {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
      }

      .status-badge__dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        animation: dotBlink 2s ease-in-out infinite;
      }

      @keyframes dotBlink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .status-badge__text {
        color: var(--text-secondary);
      }

      /* ── Map Container ────────────────────────── */
      .map-wrapper {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #map {
        height: 100%;
        width: 100%;
        z-index: 1;
      }

      /* Map tile tweaks for dark theme */
      .leaflet-tile-pane {
        filter: brightness(0.75) contrast(1.15) saturate(1.1);
      }

      .leaflet-control-attribution {
        background: var(--bg-card) !important;
        color: var(--text-secondary) !important;
        font-family: var(--font) !important;
        font-size: 0.65rem !important;
        border-radius: 8px 0 0 0 !important;
        border: 1px solid var(--border) !important;
        backdrop-filter: blur(10px) !important;
        padding: 4px 10px !important;
      }

      .leaflet-control-attribution a {
        color: var(--accent-secondary) !important;
      }

      .leaflet-control-zoom {
        border: 1px solid var(--border) !important;
        border-radius: 10px !important;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4) !important;
      }

      .leaflet-control-zoom a {
        background: var(--bg-card) !important;
        color: var(--text-primary) !important;
        border-color: var(--border) !important;
        width: 36px !important;
        height: 36px !important;
        line-height: 36px !important;
        font-size: 16px !important;
        font-weight: 600 !important;
        transition: background 0.2s ease;
      }

      .leaflet-control-zoom a:hover {
        background: var(--bg-secondary) !important;
        color: var(--accent-secondary) !important;
      }

      /* ── Popup Overrides ──────────────────────── */
      .leaflet-popup-content-wrapper {
        background: var(--bg-card) !important;
        color: var(--text-primary) !important;
        border-radius: 12px !important;
        border: 1px solid var(--border) !important;
        backdrop-filter: blur(14px) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
        font-family: var(--font) !important;
      }

      .leaflet-popup-tip {
        background: var(--bg-card) !important;
        border: 1px solid var(--border) !important;
      }

      .leaflet-popup-content {
        margin: 10px 14px !important;
        font-size: 0.82rem !important;
        font-weight: 500 !important;
      }

      /* ── Auth Button ──────────────────────────── */
      .btn-auth {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        border: none;
        border-radius: 10px;
        font-family: var(--font);
        font-size: 0.82rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(
          135deg,
          var(--accent),
          var(--accent-secondary)
        );
        cursor: pointer;
        text-decoration: none;
        letter-spacing: -0.2px;
        box-shadow: 0 0 16px var(--accent-glow);
        transition:
          transform 0.2s ease,
          box-shadow 0.25s ease,
          filter 0.2s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-auth::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .btn-auth:hover {
        transform: translateY(-1px) scale(1.03);
        box-shadow:
          0 0 28px var(--accent-glow),
          0 4px 20px rgba(0, 0, 0, 0.3);
        filter: brightness(1.1);
      }

      .btn-auth:hover::before {
        opacity: 1;
      }

      .btn-auth:active {
        transform: translateY(0) scale(0.98);
      }

      .btn-auth svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
        flex-shrink: 0;
      }

      /* ── Responsive ───────────────────────────── */
      @media (max-width: 600px) {
        .navbar {
          padding: 0 14px;
          height: 52px;
        }

        .navbar__title {
          font-size: 0.9rem;
        }

        .status-badge {
          padding: 5px 10px;
          font-size: 0.7rem;
        }

        .btn-auth {
          padding: 6px 14px;
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
      <div class="navbar__brand">
        <div class="navbar__logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"
            />
          </svg>
        </div>
        <span class="navbar__title">LiveTrack</span>
      </div>
      <div class="navbar__status">
        <div class="status-badge">
          <span class="status-badge__dot"></span>
          <span class="status-badge__text">Live</span>
        </div>
        <a href="/api/auth/signin" class="btn-auth" id="btn-login">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
          Login / Sign Up
        </a>
      </div>
    </nav>

    <!-- Map -->
    <div class="map-wrapper">
      <div id="map"></div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();
      const map = L.map("map").setView([28.7041, 77.1025], 13);
      const remoteMarkers = new Map();

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution:
          '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      socket.on("server:location:update", (data) => {
        const { id, latitude, longitude } = data;
        if (!remoteMarkers.has(id)) {
          const marker = L.marker([latitude, longitude])
            .addTo(map)
            .bindPopup(id);
          remoteMarkers.set(id, marker);
        } else {
          remoteMarkers.get(id).setLatLng([latitude, longitude]);
        }
      });

      async function handleOAuthRedirect() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        if (!code) return false;

        window.history.replaceState(
          {},
          document.title,
          window.location.pathname,
        );

        try {
          const res = await fetch("/api/auth/callback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ code }),
          });

          if (!res.ok) {
            console.error("Token exchange failed");
            return false;
          }

          return true;
        } catch (err) {
          console.error("OAuth redirect handling failed:", err);
          return false;
        }
      }

      async function checkAuth() {
        const res = await fetch("/api/auth/me", { credentials: "include" });
        if (!res.ok) return null;
        const { user } = await res.json();
        return user;
      }

      function showLoggedIn(user) {
        const loginBtn = document.getElementById("btn-login");

        const userBadge = document.createElement("div");
        userBadge.style.cssText = "display:flex;align-items:center;gap:10px;";
        userBadge.innerHTML = `
    <div class="status-badge" style="color:var(--text-primary);">
      👤 ${user.name ?? user.email ?? "User"}
    </div>
    <button
      id="btn-logout"
      class="btn-auth"
      style="background:rgba(248,113,113,0.15);box-shadow:none;border:1px solid rgba(248,113,113,0.3);color:#f87171;"
    >
      Logout
    </button>
  `;

        loginBtn.replaceWith(userBadge);

        document
          .getElementById("btn-logout")
          .addEventListener("click", async () => {
            await fetch("/api/auth/logout", {
              method: "POST",
              credentials: "include",
            });
            window.location.reload();
          });
      }

      function getUsersCurrentLocation() {
        return new Promise((res, rej) => {
          if (!("geolocation" in navigator)) {
            alert("Geolocation is not available in this browser");
            return;
          }
          navigator.geolocation.getCurrentPosition(
            (position) =>
              res({
                latitude: position.coords.latitude,
                longitude: position.coords.longitude,
              }),
            rej,
            { enableHighAccuracy: true },
          );
        });
      }

      let myCurrentLocationMarker = null;

      async function startLocationSharing() {
        setInterval(async () => {
          const { latitude, longitude } = await getUsersCurrentLocation();
          socket.emit("client:location:update", { latitude, longitude });
          if (!myCurrentLocationMarker) {
            myCurrentLocationMarker = L.marker([latitude, longitude])
              .addTo(map)
              .bindPopup("You are here");
          } else {
            myCurrentLocationMarker.setLatLng([latitude, longitude]);
          }
        }, 10 * 1000);
      }

      window.addEventListener("load", async () => {
        await handleOAuthRedirect();

        const user = await checkAuth();

        if (user) {
          showLoggedIn(user);
          startLocationSharing();
        }
      });
    </script>
  </body>
</html>
